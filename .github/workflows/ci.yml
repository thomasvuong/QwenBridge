name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core dependencies
        run: |
          pip install fastapi uvicorn python-dotenv pydantic httpx openai mcp rich \
                      pytest pytest-asyncio pytest-mock

      - name: Run all tests in mock mode
        run: |
          MOCK_MODE=true python3 -m pytest tests/ -v --tb=short

      - name: Verify server starts
        run: |
          MOCK_MODE=true python3 main.py &
          sleep 4
          curl -f http://localhost:8765/health
          kill %1

      - name: Verify MCP tools registered
        run: |
          MOCK_MODE=true python3 -c "
          from mcp_server import mcp
          tools = mcp._tool_manager._tools
          expected = {'qwen_chat','qwen_vision','qwen_memory_store',
                      'qwen_memory_recall','qwen_code','qwen_simulate','qwen_cost_report'}
          actual = set(tools.keys())
          assert actual == expected, f'Missing tools: {expected - actual}'
          print(f'All {len(actual)} MCP tools registered correctly')
          "
